<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KG-RAG UI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-router-dom@6.26.0/dist/umd/react-router-dom.production.min.js"></script>
    <script>
      console.log('ReactRouterDOM object:', window.ReactRouterDOM);
      if (window.ReactRouterDOM) {
        console.log('ReactRouterDOM keys:', Object.keys(window.ReactRouterDOM));
      }
      window.addEventListener('error', function(e) {
        console.error('Runtime error:', e.error);
        if (document.getElementById('root') && document.getElementById('root').innerHTML === '') {
          document.getElementById('root').innerHTML = '<div style="color:red;padding:20px;font-family:sans-serif;"><b>Frontend Error:</b> ' + e.message + '<br/><br/><small>Check browser console (F12) for more details.</small></div>';
        }
      });
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <script type="module" src="/app.js"></script>
  </body>
  </html>
